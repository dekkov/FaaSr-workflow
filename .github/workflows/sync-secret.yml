name: '  (FAASR SYNC SECRET)'

on:
  workflow_dispatch:
    inputs:
      workflow_file:
        description: 'Workflow JSON file name'
        required: true
        type: string
        
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pyyaml PyGithub requests FaaSr_py

      - name: Sync Secret
        env:
          ALL_SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          python scripts/sync_secret.py --workflow-file ${{ github.event.inputs.workflow_file }} 
